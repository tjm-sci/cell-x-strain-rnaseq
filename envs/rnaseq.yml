name: rnaseq
channels:
  - conda-forge
  - bioconda
dependencies:
  # Core workflow runtime
  - openjdk=17
  - nextflow
  - graphviz

  # DEA / downstream analysis runtime
  - r-base=4.5

  # Bioconductor packages used by the current DEA scripts
  - bioconductor-tximport
  - bioconductor-deseq2
  - bioconductor-summarizedexperiment
  - bioconductor-limma
  - bioconductor-variancepartition

  # Plotting and report-friendly tables
  - r-here
  - r-dplyr
  - r-ggplot2
  - r-ggrepel
  - r-pheatmap
  - r-stringr
  - r-tibble
  - r-tidyr
