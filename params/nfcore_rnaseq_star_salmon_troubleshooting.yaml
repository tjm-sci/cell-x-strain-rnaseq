# Keep the pilot storage-light unless BAMs or intermediate alignments are needed.
save_reference: false
save_merged_fastq: false
save_trimmed: false
save_non_ribo_reads: false
save_align_intermeds: false
save_unaligned: false

# Reference locked for this project: Ensembl release 115 / GRCm39.
fasta: /home/tmurphy/exp383_code/cell-x-strain-rnaseq/resources/reference/Mus_musculus.GRCm39.dna.primary_assembly.fa.gz
gtf: /home/tmurphy/exp383_code/cell-x-strain-rnaseq/resources/reference/Mus_musculus.GRCm39.115.gtf.gz

extra_salmon_quant_args: "--seqBias --gcBias"

