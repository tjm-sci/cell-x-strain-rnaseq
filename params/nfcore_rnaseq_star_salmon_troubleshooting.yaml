input: /home/tmurphy/exp383_code/cell-x-strain-rnaseq/metadata/batches/exp383_nfcore_rnaseq_PU1.csv
outdir: /home/tmurphy/exp383_code/cell-x-strain-rnaseq/results/nfcore_rnaseq_star_salmon_troubleshooting/PU1

trimmer: fastp
remove_ribo_rna: true
ribo_removal_tool: bowtie2
ribo_database_manifest: /home/tmurphy/exp383_code/cell-x-strain-rnaseq/resources/rrna/eukaryote_rrna_manifest.txt

# Troubleshooting mode: genome alignment plus Salmon quantification.
aligner: star_salmon
